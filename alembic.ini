[alembic]
script_location = alembic
prepend_sys_path = .
# Database URL is read from environment via alembic/env.py (settings.database_url_with_params)
# Set DATABASE_URL in .env or environment. This value is a fallback only.
sqlalchemy.url = sqlite:///data/esl.db

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S